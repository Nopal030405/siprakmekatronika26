{% extends "base.html" %}
{% block content %}
<div style="text-align:center; padding:3rem 1rem;">
    <h2 style="font-size:1.8rem; color:var(--primary);">🔍 Viewer Login</h2>
    <p style="color:var(--text-muted); margin-bottom:1.5rem;">Mode Read-Only — Lihat semua data tanpa bisa mengedit.</p>
    <form method="POST" style="max-width:360px; margin:0 auto;">
        <div class="form-group"><label>Username</label><input type="text" name="name" class="form-control" placeholder="Username viewer" required></div>
        <div class="form-group"><label>Password</label><input type="password" name="password" class="form-control" placeholder="Password" required></div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Masuk sebagai Viewer</button>
    </form>
</div>
{% endblock %}
