{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card glass-panel">
        <div style="text-align: center; margin-bottom: 1.5rem;">
            <div style="font-size: 2rem; margin-bottom: 0.75rem;">🔐</div>
            <h2 class="card-title" style="text-align: center; margin-bottom: 0.25rem;">Login Asprak</h2>
            <p style="color: var(--text-muted); font-size: 0.85rem;">Masuk untuk mengelola penilaian praktikum</p>
        </div>
        <form method="POST" action="{{ url_for('asprak_login') }}">
            <div class="form-group">
                <label for="name">Nama Asisten</label>
                <input type="text" name="name" id="name" class="form-control" placeholder="Masukkan nama..." required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Masukkan password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Login</button>
        </form>
    </div>
</div>
{% endblock %}
